# CPT runs in remote mode against the orchestration cluster mounted
# into the verifier's network namespace (compose: network_mode =
# service:orchestration). REST and management endpoints are reachable
# on localhost.
runtimeMode=remote
remote.camundaMonitoringApiAddress=http://127.0.0.1:9600
camunda.client.gateway.rest.address=http://127.0.0.1:8080
camunda.client.gateway.grpc.address=http://127.0.0.1:26500
# Allow some startup slack for the shared cluster — health is already
# enforced by compose, this is belt-and-braces.
remote.runtimeConnectionTimeout=PT1M

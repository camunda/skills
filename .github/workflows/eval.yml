name: Eval (PR)

# Non-blocking PR eval signal. Posts the outcome + baseline deltas as a
# PR comment. It does NOT gate merge (keep it out of required status
# checks).
#
# Opt-in and maintainer-gated by labels (only triage+ collaborators can
# label a PR, so the label itself is the gate; fork PRs never receive
# the secrets because this is `pull_request`, not `pull_request_target`):
#   - `evals:run`      → scenarios whose metadata.skills ∩ changed skills
#   - `evals:run-all`  → every scenario (integration check of the suite)
# Can also be launched from the Actions tab (workflow_dispatch already
# requires write access); a dispatch run with no PR context runs every
# scenario and skips the comment.
#
# The model is configurable via the EVAL_MODEL repo variable (CI
# defaults to a Bedrock Claude profile) — see
# docs/evals/ci-and-results.md for secrets/vars.
on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-scenarios:
    name: Detect affected scenarios
    # Label application requires triage+ on the repo, so the label is the
    # maintainer gate; workflow_dispatch already requires write access.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'evals:run') ||
      contains(github.event.pull_request.labels.*.name, 'evals:run-all')
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.filter.outputs.scenarios }}
      has-scenarios: ${{ steps.filter.outputs.has-scenarios }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          python-version-file: .python-version
      - name: Sync deps
        run: uv sync --frozen
      - name: Compute changed skills
        id: changed-skills
        env:
          RUN_ALL: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'evals:run-all') }}
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # `evals:run-all` (or a dispatch with no PR context) runs the
          # whole suite — emit every skill so the registry yields all
          # scenarios. Useful for an end-to-end integration check.
          if [ "$RUN_ALL" = "true" ] || [ -z "$base" ]; then
            ls skills > changed-skills.txt
          else
            # Skills appear as skills/<name>/...; extract unique <name> values.
            git diff --name-only "$base..$head" \
              | awk -F/ '$1=="skills" && NF>1 {print $2}' \
              | sort -u > changed-skills.txt
            # When the harness itself changed (evals/ tree or the root
            # Python project), run everything by emitting all skills.
            if git diff --name-only "$base..$head" 2>/dev/null \
                 | grep -qE '^evals/|^pyproject\.toml$|^uv\.lock$|^\.python-version$'; then
              ls skills > changed-skills.txt
            fi
          fi
          echo "Changed skills:"
          cat changed-skills.txt
      - name: Filter scenarios via registry
        id: filter
        run: |
          changed=$(tr '\n' ' ' < changed-skills.txt)
          scenarios_json=$(uv run evals-list --json --changed-skills $changed)
          echo "$scenarios_json"
          # GitHub Actions matrix wants a JSON list. Extract scenario ids.
          ids=$(echo "$scenarios_json" | python -c "import json,sys; print(json.dumps([s['id'] for s in json.load(sys.stdin)]))")
          echo "scenarios=$ids" >> "$GITHUB_OUTPUT"
          if [ "$ids" = "[]" ]; then
            echo "has-scenarios=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-scenarios=true" >> "$GITHUB_OUTPUT"
          fi

  run-scenarios:
    name: Eval ${{ matrix.scenario }}
    needs: detect-scenarios
    if: needs.detect-scenarios.outputs.has-scenarios == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJson(needs.detect-scenarios.outputs.scenarios) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version-file: .python-version
      - name: Sync deps
        run: uv sync --frozen
      - name: Build sandbox images
        run: make eval-images
      - name: Run scenario (with-skill arm)
        # Reds the check on a real breakage (sandbox/auth/exception);
        # a scenario that merely scores low still exits 0 here — the
        # quality gate is the separate evals-pass-fail step below.
        #
        # CI defaults to the Bedrock global Claude profile; override
        # without a code change by setting the `EVAL_MODEL` repo
        # variable. The credential env below is the wiring for that
        # default provider; swap it if you point EVAL_MODEL elsewhere.
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'us-east-1' }}
        run: |
          make eval SCENARIO=${{ matrix.scenario }} \
            MODEL="${{ vars.EVAL_MODEL || 'anthropic/bedrock/global.anthropic.claude-sonnet-4-6' }}"
      - name: Gate (evals-pass-fail)
        # Reds the check when the with-skill run misses its per-sample
        # threshold or drifts outside the baseline bands. Non-blocking
        # until this workflow is added to required status checks — the
        # red is a signal to look, the PR comment carries the detail.
        run: uv run evals-pass-fail
      - name: Upload eval logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-logs-${{ matrix.scenario }}-${{ github.run_attempt }}
          path: evals/logs/
          retention-days: 30

  summarize:
    name: Summarize → PR comment
    needs: run-scenarios
    if: always() && needs.detect-scenarios.outputs.has-scenarios == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version-file: .python-version
      - name: Sync deps
        run: uv sync --frozen
      - name: Download all logs
        uses: actions/download-artifact@v4
        with:
          path: evals/logs/
          pattern: eval-logs-*
          merge-multiple: true
      - name: Render summary
        id: summary
        run: |
          {
            echo 'body<<COMMENT_EOF'
            uv run evals-summarize --log-dir evals/logs/
            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Find existing eval comment
        if: github.event_name == 'pull_request'
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- camunda-skills-eval-comment -->
      - name: Post / update PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.summary.outputs.body }}
          edit-mode: replace

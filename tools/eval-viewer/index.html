<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Eval Viewer</title>
  <link rel="stylesheet" href="/node_modules/bpmn-js/dist/assets/diagram-js.css">
  <link rel="stylesheet" href="/node_modules/bpmn-js/dist/assets/bpmn-js.css">
  <link rel="stylesheet" href="/node_modules/bpmn-js/dist/assets/bpmn-font/css/bpmn-embedded.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }

    .header {
      background: #1a1a2e; color: white; padding: 12px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }

    .nav {
      background: #2a2a3e; padding: 10px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .nav label { color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .nav select {
      background: #3a3a5e; color: white; border: 1px solid #4a4a6e;
      padding: 6px 12px; border-radius: 4px; font-size: 13px; cursor: pointer;
    }
    .nav select:hover { border-color: #6a6a8e; }
    .nav .separator { color: #4a4a6e; }

    .summary-bar {
      background: #f0f0f0; padding: 10px 20px; border-bottom: 1px solid #ddd;
      display: flex; gap: 24px; font-size: 13px; align-items: center;
    }
    .summary-stat { display: flex; align-items: center; gap: 6px; }
    .summary-stat .value { font-weight: 600; }
    .summary-stat.positive .value { color: #16a34a; }
    .summary-stat.negative .value { color: #dc2626; }
    .summary-stat.neutral .value { color: #333; }

    .tabs {
      background: #e8e8e8; padding: 0 20px; display: flex; gap: 2px;
      border-bottom: 2px solid #ddd; overflow-x: auto;
    }
    .tab {
      padding: 10px 16px; cursor: pointer; font-size: 13px; font-weight: 500;
      background: transparent; border: none; color: #666;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      white-space: nowrap; display: flex; align-items: center; gap: 8px;
    }
    .tab:hover { color: #333; background: #ddd; }
    .tab.active { color: #1a1a2e; border-bottom-color: #fc5d0d; background: white; }
    .badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 600; }
    .badge.pass { background: #dcfce7; color: #166534; }
    .badge.partial { background: #fef9c3; color: #854d0e; }
    .badge.fail { background: #fecaca; color: #991b1b; }

    .eval-prompt {
      padding: 12px 20px; background: #fff; border-bottom: 1px solid #eee;
      font-size: 13px; color: #555;
    }
    .eval-prompt strong { color: #333; }

    .panels { display: flex; min-height: 500px; }
    .panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #ddd; }
    .panel:last-child { border-right: none; }

    .panel-header {
      background: #f0f0f0; padding: 8px 16px; font-size: 13px; font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #ddd;
    }
    .panel-header .meta { font-weight: 400; color: #888; font-size: 11px; }
    .panel-header button {
      background: #ddd; border: none; padding: 3px 10px;
      border-radius: 3px; cursor: pointer; font-size: 11px;
    }
    .panel-header button:hover { background: #ccc; }

    .canvas { flex: 1; background: white; position: relative; min-height: 400px; }

    .grading {
      padding: 12px 16px; background: #fafafa; border-top: 1px solid #eee;
      max-height: 300px; overflow-y: auto;
    }
    .grading h3 { font-size: 12px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .assertion {
      display: flex; gap: 8px; align-items: flex-start; padding: 4px 0;
      font-size: 12px; border-bottom: 1px solid #f0f0f0;
    }
    .assertion:last-child { border-bottom: none; }
    .assertion .icon {
      flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
    }
    .assertion .icon.pass { background: #dcfce7; color: #166534; }
    .assertion .icon.fail { background: #fecaca; color: #991b1b; }
    .assertion .text { flex: 1; }
    .assertion .evidence { color: #888; font-size: 11px; margin-top: 2px; }

    .text-output {
      flex: 1; padding: 16px; font-family: 'SF Mono', Monaco, monospace;
      font-size: 12px; overflow: auto; background: white;
      white-space: pre-wrap; word-break: break-word;
    }

    .no-output {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #999; font-size: 14px; background: white;
    }

    .file-tabs { display: flex; gap: 1px; background: #e0e0e0; }
    .file-tab {
      padding: 4px 12px; font-size: 11px; cursor: pointer;
      background: #f0f0f0; border: none; color: #666;
    }
    .file-tab:hover { background: #e8e8e8; }
    .file-tab.active { background: white; color: #333; font-weight: 600; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 60vh; color: #999;
    }
    .empty-state h2 { font-size: 18px; color: #666; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Skill Eval Viewer</h1>
  </div>
  <div class="nav" id="nav">
    <label>Skill</label>
    <select id="skillSelect" onchange="onSkillChange()"></select>
    <span class="separator">/</span>
    <label>Iteration</label>
    <select id="iterationSelect" onchange="onIterationChange()"></select>
  </div>
  <div class="summary-bar" id="summaryBar"></div>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>

  <script type="module">
    import BpmnJS from 'bpmn-js/lib/NavigatedViewer';
    import ElementTemplateIconRenderer from '@bpmn-io/element-template-icon-renderer';

    let skills = [];
    let currentData = null;
    let activeTab = 0;
    let viewers = [];
    let pendingInitialIteration = null;
    let pendingInitialEval = null;

    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      return { skill: params.get('skill'), iteration: params.get('iteration'), eval: params.get('eval') };
    }

    function updateUrl() {
      if (!currentData) return;
      const params = new URLSearchParams();
      params.set('skill', currentData.skill);
      params.set('iteration', currentData.iteration);
      if (currentData.evals[activeTab]) params.set('eval', currentData.evals[activeTab].name);
      history.replaceState(null, '', `${window.location.pathname}?${params}`);
    }

    async function init() {
      const res = await fetch('/api/skills');
      const data = await res.json();
      skills = data.skills;
      const serverInitial = data.initial;
      const urlParams = getUrlParams();

      if (skills.length === 0) {
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <h2>No eval results found</h2>
            <p>Run evals first, then come back here to review results.</p>
          </div>`;
        return;
      }

      const skillSelect = document.getElementById('skillSelect');
      skillSelect.innerHTML = skills.map(s => `<option value="${s.name}">${s.name}</option>`).join('');

      if (urlParams.skill && skills.find(s => s.name === urlParams.skill)) {
        skillSelect.value = urlParams.skill;
        pendingInitialIteration = urlParams.iteration;
        pendingInitialEval = urlParams.eval;
      } else if (serverInitial?.skill) {
        skillSelect.value = serverInitial.skill;
        pendingInitialIteration = serverInitial.iteration;
      }

      await onSkillChange();
    }

    window.onSkillChange = async function() {
      const skillName = document.getElementById('skillSelect').value;
      const skill = skills.find(s => s.name === skillName);
      if (!skill) return;

      const iterSelect = document.getElementById('iterationSelect');
      iterSelect.innerHTML = skill.iterations.map(it => `<option value="${it.name}">${it.name}</option>`).join('');

      if (pendingInitialIteration) {
        iterSelect.value = pendingInitialIteration;
        pendingInitialIteration = null;
      } else {
        iterSelect.value = skill.iterations[skill.iterations.length - 1].name;
      }
      await onIterationChange();
    };

    window.onIterationChange = async function() {
      const skillName = document.getElementById('skillSelect').value;
      const iterName = document.getElementById('iterationSelect').value;

      const res = await fetch(`/api/iteration/${skillName}/${iterName}`);
      currentData = await res.json();

      let initialEvalIndex = 0;
      if (pendingInitialEval) {
        const idx = currentData.evals.findIndex(e => e.name === pendingInitialEval);
        if (idx >= 0) initialEvalIndex = idx;
        pendingInitialEval = null;
      }

      activeTab = initialEvalIndex;
      renderSummary();
      renderTabs();
      await showEval(initialEvalIndex);
    };

    function renderSummary() {
      const bar = document.getElementById('summaryBar');
      const totals = {};
      for (const ev of currentData.evals) {
        for (const cfg of ev.configs) {
          if (!totals[cfg.name]) totals[cfg.name] = { passed: 0, total: 0, tokens: 0, time: 0, count: 0 };
          if (cfg.grading?.summary) {
            totals[cfg.name].passed += cfg.grading.summary.passed;
            totals[cfg.name].total += cfg.grading.summary.total;
          }
          if (cfg.timing) {
            totals[cfg.name].tokens += cfg.timing.total_tokens || 0;
            totals[cfg.name].time += cfg.timing.total_duration_seconds || 0;
            totals[cfg.name].count++;
          }
        }
      }
      let html = '';
      for (const [name, data] of Object.entries(totals)) {
        const rate = data.total > 0 ? Math.round(data.passed / data.total * 100) : 0;
        const cls = rate === 100 ? 'positive' : rate >= 70 ? 'neutral' : 'negative';
        html += `<div class="summary-stat ${cls}">
          <span>${name.replace(/_/g, ' ')}:</span>
          <span class="value">${data.passed}/${data.total} (${rate}%)</span>`;
        if (data.count > 0) {
          html += `<span style="color:#888; font-size:11px;">avg ${Math.round(data.tokens / data.count).toLocaleString()} tok, ${(data.time / data.count).toFixed(1)}s</span>`;
        }
        html += `</div>`;
      }
      bar.innerHTML = html;
    }

    function renderTabs() {
      document.getElementById('tabs').innerHTML = currentData.evals.map((ev, i) => {
        const ws = ev.configs.find(c => c.name === 'with_skill');
        let badge = '';
        if (ws?.grading?.summary) {
          const s = ws.grading.summary;
          const rate = s.total > 0 ? s.passed / s.total : 0;
          const cls = rate === 1 ? 'pass' : rate >= 0.7 ? 'partial' : 'fail';
          badge = `<span class="badge ${cls}">${s.passed}/${s.total}</span>`;
        }
        return `<button class="tab ${i === activeTab ? 'active' : ''}" onclick="showEval(${i})">${ev.name}${badge}</button>`;
      }).join('');
    }

    window.showEval = async function(index) {
      activeTab = index;
      renderTabs();

      viewers.forEach(v => { if (v) (v.viewer || v).destroy(); });
      viewers = [];

      const ev = currentData.evals[index];
      const content = document.getElementById('content');

      let html = `<div class="eval-prompt"><strong>Prompt:</strong> ${ev.metadata.prompt || 'N/A'}</div>`;
      html += `<div class="panels">`;

      for (const cfg of ev.configs) {
        html += `<div class="panel" id="panel-${cfg.name}">`;
        html += `<div class="panel-header"><span>${cfg.label}`;
        if (cfg.timing) {
          html += ` <span class="meta">${(cfg.timing.total_tokens || 0).toLocaleString()} tokens, ${(cfg.timing.total_duration_seconds || 0).toFixed(1)}s</span>`;
        }
        html += `</span>`;
        if (cfg.outputs.some(f => f.type === 'bpmn')) {
          html += `<button onclick="fitPanel('${cfg.name}')">Fit</button>`;
        }
        html += `</div>`;

        if (cfg.outputs.length > 1) {
          html += `<div class="file-tabs">`;
          cfg.outputs.forEach((f, fi) => {
            html += `<button class="file-tab ${fi === 0 ? 'active' : ''}" onclick="showFile('${cfg.name}', ${fi})">${f.name}</button>`;
          });
          html += `</div>`;
        }

        if (cfg.outputs.length > 0) {
          cfg.outputs.forEach((f, fi) => {
            const display = fi === 0 ? '' : 'display:none;';
            if (f.type === 'bpmn' || f.type === 'dmn') {
              html += `<div class="canvas" id="canvas-${cfg.name}-${fi}" data-path="${f.path}" data-type="${f.type}" style="${display}"></div>`;
            } else {
              html += `<div class="text-output" id="canvas-${cfg.name}-${fi}" data-path="${f.path}" data-type="text" style="${display}"></div>`;
            }
          });
        } else {
          html += `<div class="no-output">No output files</div>`;
        }

        if (cfg.grading?.expectations) {
          html += `<div class="grading"><h3>Assertions (${cfg.grading.summary?.passed || 0}/${cfg.grading.summary?.total || 0})</h3>`;
          for (const exp of cfg.grading.expectations) {
            const icon = exp.passed ? 'pass' : 'fail';
            const letter = exp.passed ? 'P' : 'F';
            html += `<div class="assertion">
              <div class="icon ${icon}">${letter}</div>
              <div><div class="text">${exp.text}</div>
              ${exp.evidence ? `<div class="evidence">${exp.evidence}</div>` : ''}
              </div></div>`;
          }
          html += `</div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;

      content.innerHTML = html;
      await loadOutputs(ev);
      updateUrl();
    };

    async function loadOutputs(ev) {
      for (const cfg of ev.configs) {
        for (let fi = 0; fi < cfg.outputs.length; fi++) {
          const f = cfg.outputs[fi];
          const el = document.getElementById(`canvas-${cfg.name}-${fi}`);
          if (!el) continue;

          const res = await fetch(`/api/file?path=${encodeURIComponent(f.path)}`);
          const fileContent = await res.text();

          if (f.type === 'bpmn') {
            try {
              const viewer = new BpmnJS({
                container: el,
                additionalModules: [ElementTemplateIconRenderer]
              });
              await viewer.importXML(fileContent);
              viewer.get('canvas').zoom('fit-viewport');
              viewers.push({ viewer, configName: cfg.name, fileIndex: fi });
            } catch (err) {
              el.className = 'text-output';
              el.textContent = `Error rendering BPMN: ${err.message}\n\n${fileContent.substring(0, 500)}...`;
              viewers.push(null);
            }
          } else {
            el.textContent = fileContent;
          }
        }
      }
    }

    window.fitPanel = function(configName) {
      for (const v of viewers) {
        if (v && v.configName === configName) {
          v.viewer.get('canvas').zoom('fit-viewport');
        }
      }
    };

    window.showFile = function(configName, fileIndex) {
      const panel = document.getElementById(`panel-${configName}`);
      panel.querySelectorAll('.canvas, .text-output').forEach((el, i) => {
        el.style.display = i === fileIndex ? '' : 'none';
      });
      panel.querySelectorAll('.file-tab').forEach((tab, i) => {
        tab.className = `file-tab ${i === fileIndex ? 'active' : ''}`;
      });
      for (const v of viewers) {
        if (v && v.configName === configName && v.fileIndex === fileIndex) {
          v.viewer.get('canvas').zoom('fit-viewport');
        }
      }
    };

    init();
  </script>
</body>
</html>

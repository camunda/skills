# Sandbox compose — with-c8ctl + CPT verifier archetype.
#
# Referenced directly from a scenario's task.py via
# ``Task(sandbox=("docker", str(SANDBOXES_DIR / "compose-cpt-verifier.yaml")))``.
# Used by scenarios whose verifier needs CPT (verifier="cpt" or a
# composite that includes it).
#
# Adds a `verifier` service alongside `default`; the verifier mounts
# the agent's `outputs/` read-only and shares a Maven `.m2` cache for
# faster repeat runs. Scorers reach the verifier via
# ``sandbox("verifier")``.

services:
  orchestration:
    image: camunda/camunda:8.9
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9600 && echo -e \"GET /actuator/health/status HTTP/1.1\r\nHost: localhost\r\n\r\n\" >&3 && head -n 1 <&3'"]
      interval: 1s
      retries: 60
      start_period: 30s
    configs:
      - source: orchestration-config
        target: /usr/local/camunda/config/application.yaml

  default:
    image: camunda-skills-evals-with-c8ctl:latest
    network_mode: "service:orchestration"
    command: ["sleep", "infinity"]
    init: true
    working_dir: /workspace
    volumes:
      - outputs:/workspace/outputs
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    depends_on:
      orchestration:
        condition: service_healthy

  verifier:
    image: camunda-skills-evals-verifier:latest
    command: ["sleep", "infinity"]
    init: true
    working_dir: /workspace
    volumes:
      - outputs:/outputs:ro
      - m2-cache:/.m2
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

configs:
  orchestration-config:
    file: ./orchestration/application-h2.yaml

volumes:
  outputs:
  m2-cache:

id: quality-discover-messaging-connectors
name: Quality - Discover messaging connectors
description: |
  Tests that the agent uses c8ctl element-template search to discover
  messaging-related connectors rather than listing from memory.
tags:
  - quality

inputs:
  prompt: |
    What connectors are available for sending messages or notifications?

graders:
  - type: prompt
    name: rubric-judge
    config:
      prompt: |
        Score 1.0 if ALL of these hold for the agent's response,
        otherwise 0.0:
        - Uses `c8ctl element-template search` to discover relevant
          templates (e.g., search for 'slack', 'email', 'kafka', etc.).
        - Identifies messaging connectors like Slack, SendGrid, email,
          RabbitMQ, Kafka.
        - Provides brief description of what each connector does.

# Docker Compose for eval sandboxes.
#
# Inspect AI's docker sandbox provider drives this file. The `default`
# service is what the agent runs in (Phase 1); the agent boots c8run
# inside this same container via `c8ctl cluster start`, so there is no
# separate c8run compose service. (c8run is a CLI-managed subprocess,
# not a Docker image.)
#
# Phase 2 (verifier) runs as a separate compose invocation with
# network egress denied (see services.verifier below) — scenarios that
# need it reference this file's verifier service.
#
# Images are built by `make eval-images` from the Dockerfiles next to
# this file. Compose only references the tagged images.

services:
  default:
    # Image is parameterized via IMAGE env var (set by lib/registry.py
    # based on metadata.image). Defaults to with-c8ctl for convenience.
    image: ${IMAGE:-camunda-skills-evals-with-c8ctl:latest}
    working_dir: /workspace
    # outputs/ is the artifact bridge between Phase 1 and Phase 2.
    volumes:
      - outputs:/workspace/outputs
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    # Phase 1 needs network access (agent uses tools, c8ctl downloads
    # c8run on first run, etc.). Restrictions are on the verifier service.

  verifier:
    image: camunda-skills-evals-verifier:latest
    working_dir: /workspace
    volumes:
      - outputs:/outputs:ro
      - m2-cache:/.m2
      # The scenario mounts its own cpt-verifier/ project at /workspace.
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    # Verifier is network-restricted. Today we allow the default bridge so
    # online Maven can fetch deps into the .m2 cache; the dep-tree
    # bake-in follow-up (see plan) switches to network_mode: none.
    profiles: ["verifier"]

volumes:
  outputs:
  m2-cache:

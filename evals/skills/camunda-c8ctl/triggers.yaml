target_skill: camunda-c8ctl
samples:
  - id: install-cli
    prompt: "I need a command-line tool to talk to my Camunda 8 cluster — how do I install and configure it?"
    should_load: [camunda-c8ctl]
  - id: start-local-cluster
    prompt: "Spin up a local Camunda 8 cluster on my machine so I can experiment."
    should_load: [camunda-c8ctl]
  - id: neg-author-dmn
    prompt: "I need a decision table that picks a shipping method based on weight and destination region."
    should_load: [camunda-dmn]
    should_not_load: [camunda-c8ctl]

id: neg-incident-debug
name: Negative trigger - neg-incident-debug
description: Trigger probe ported from triggers.json (negative).
tags:
  - negative-trigger

inputs:
  prompt: 'I have a stuck process instance with an incident on a service task. Help me find the root cause.'

expected:
  should_trigger: false

graders:
  - type: trigger
    name: trigger-negative
    config:
      skill_path: skills/camunda-bpmn/SKILL.md
      mode: negative
      threshold: 0.6

id: quality-dynamic-values
name: Quality - Dynamic dropdown values
description: |
  Tests that the agent uses valuesExpression bound to a process variable
  rather than a static values array.
tags:
  - quality

inputs:
  prompt: |
    Create a form with a dropdown populated from a process variable
    called departments.

graders:
  - type: prompt
    name: rubric-judge
    config:
      prompt: |
        Score 1.0 if ALL of these hold for the agent's response,
        otherwise 0.0:
        - Contains a select component with valuesExpression set to
          "=departments".
        - Does not use a static values array on the select.
        - The select component has key, label, id, and layout properties.
        - Includes metadata: executionPlatform, executionPlatformVersion,
          schemaVersion 18, exporter, id, type.

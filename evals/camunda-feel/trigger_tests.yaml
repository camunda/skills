# SPIKE — verifying waza's trigger_tests.yaml mechanism.
# If this works, the six pos-/neg- task YAMLs in tasks/ become redundant.
skill: camunda-feel

should_trigger_prompts:
  - prompt: "This expression returns null and I don't understand why: `if amount > 1000 amount * 0.85 else amount`. Help me fix it."
    reason: Debug request on a broken FEEL if-then-else (missing `then`)
    confidence: high

  - prompt: "Add a validation rule on a form field so the email address must contain an '@'."
    reason: Form validation rule — FEEL is the validation language, but the prompt is form-shaped
    confidence: medium

  - prompt: "Write a condition that routes to the premium track when order total exceeds 1000 and the customer tier is gold."
    reason: Gateway condition — FEEL drives sequence-flow routing
    confidence: high

should_not_trigger_prompts:
  - prompt: "How do I model a parallel split followed by a parallel join in BPMN? No conditions needed, just the structure."
    reason: Pure BPMN structure question — no expressions involved
    confidence: high

  - prompt: "How do I deploy invoice-approval.bpmn to my cluster?"
    reason: Deployment task — belongs to camunda-process-mgmt
    confidence: high

  - prompt: "Convert this JUEL expression to Camunda 7 syntax: ${customer.tier == 'gold'}"
    reason: Camunda 7 / JUEL is out of scope — but the word "expression" can pull the model toward FEEL
    confidence: medium

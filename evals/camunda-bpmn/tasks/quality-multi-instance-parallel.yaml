id: quality-multi-instance-parallel
name: Quality - Multi-instance parallel service task
description: |
  Tests that the agent wires a parallel multi-instance service task with
  the correct Zeebe loopCharacteristics (inputCollection / inputElement /
  outputCollection).
tags:
  - quality

inputs:
  prompt: |
    Create a BPMN 2.0 process with a multi-instance service task 'Validate
    item' that runs in parallel once per element of the input `items` list.
    Each instance must receive the current item as `currentItem` and return
    a result that is collected into an output list called `itemResults`.
    Include the standard Zeebe namespace and a full bpmndi:BPMNDiagram with
    coordinates. Write the complete BPMN 2.0 XML — and only the XML, no
    fences, no commentary — to outputs/process.bpmn. The file must pass
    `c8ctl bpmn lint --quiet` (no errors).

graders:
  - type: prompt
    name: rubric-judge
    config:
      continue_session: true
      prompt: |
        Read outputs/process.bpmn and score 1.0 if ALL of these hold for
        the agent's final BPMN, otherwise 0.0:
        - Service task contains <bpmn:multiInstanceLoopCharacteristics
          isSequential='false'> (parallel, not sequential).
        - Inside extensionElements, <zeebe:loopCharacteristics> sets
          inputCollection referencing items (e.g. inputCollection='=items').
        - <zeebe:loopCharacteristics> sets inputElement='currentItem'.
        - <zeebe:loopCharacteristics> sets outputCollection='itemResults'
          AND outputElement (e.g. '=result') so per-instance outputs are
          collected.

  - type: program
    name: bpmn-lint
    config:
      command: bash
      args:
        - evals/camunda-bpmn/graders/bpmn-lint.sh
        - outputs/process.bpmn

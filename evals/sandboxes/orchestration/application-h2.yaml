# H2-backed Camunda orchestration config — no Elasticsearch/Postgres.
#
# Copied (with light trimming) from camunda/camunda-distributions
# 8.9 reference: docker-compose/versions/camunda-8.9/configuration/
#
# `unprotectedApi: true` + `authorizations.enabled: false` keeps the
# REST API open so scenarios don't need to manage tokens. The
# `demo/demo` user is created for the rare scenario that exercises
# the UIs (Operate/Tasklist).

management.endpoints.configprops.show-values: always
camunda:
  backup:
    webapps:
      enabled: false
  system:
    cpu-thread-count: "3"
    io-thread-count: "3"
  security:
    authentication:
      method: "basic"
      unprotectedApi: true
    authorizations:
      enabled: false
    initialization:
      users:
        - username: "demo"
          password: "demo"
          name: "Demo User"
          email: "demo@demo.com"
      defaultRoles.admin.users:
        - "demo"
  data:
    secondary-storage:
      type: rdbms
      rdbms:
        url: jdbc:h2:file:./camunda-data/h2db
        username: sa
        password:
        flushInterval: PT0.5S
        queueSize: 1000
  mcp:
    enabled: true

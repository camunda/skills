target_skill: camunda-development
also_run_when_changed:
  - camunda-connectors
  - camunda-connectors-development
  - camunda-job-workers
  - camunda-ai-agents
positive:
  - id: connector-or-worker
    prompt: "We have a high-throughput step that calls our Spring Boot service holding warm caches. Should I use a connector or a job worker here?"
  - id: unsure-integration-approach
    prompt: "I need to integrate an external API into my process but I'm not sure whether to use an out-of-the-box connector, a custom connector, or a job worker. How should I decide?"
negative:
  - id: pure-feel
    prompt: "What FEEL expression returns the number of days between two date variables?"
    should_load: [camunda-feel]

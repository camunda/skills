# Sandbox compose — base archetype.
#
# Referenced directly from a scenario's task.py via
# ``Task(sandbox=("docker", str(SANDBOXES_DIR / "compose-base.yaml")))``.
#
# Used by the c8ctl-bootstrap scenario, which exercises the
# camunda-c8ctl install path from a clean container. The agent loop
# runs in the Inspect host process (react() with bash_session +
# text_editor + skill); only the tool calls execute inside this
# container, so no model API keys need to be passed through.

services:
  default:
    image: camunda-skills-evals-base:latest
    working_dir: /workspace
    volumes:
      - outputs:/workspace/outputs
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

volumes:
  outputs:

name: Eval (nightly)

# Broad regression sweep over every target (triggers + outcome evals),
# running both the with-skill and without-skill arms so the with/without delta
# is captured. Complements eval.yml's affected-subset PR signal. Uploads .eval
# logs; never blocks merges. See docs/evals/ci-and-results.md.
#
# Manual-only until the suite is stable; cron re-enabled in a follow-up.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eval-nightly
  cancel-in-progress: false

jobs:
  detect:
    name: Enumerate targets
    runs-on: ubuntu-latest
    outputs:
      specs: ${{ steps.matrix.outputs.specs }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --frozen
      - id: matrix
        run: |
          uv run evals-list --json > targets.json
          # Every target; outcome evals run both arms (compare).
          python3 - <<'PY' > specs.json
          import json
          specs = []
          for t in json.load(open("targets.json")):
              spec = t["path"] + (f"@{t['task']}" if t["task"] else "")
              base = " ".join(f"-T {k}={v}" for k, v in (t["args"] or {}).items())
              slug = t["id"].replace(":", "-")
              if t["kind"] == "trigger":
                  specs.append({"slug": slug, "label": t["id"], "spec": spec, "targs": base,
                                "arm": "", "sandbox": False, "max_samples": 5})
              else:
                  for arm in ["with_skill", "without_skill"]:
                      specs.append({
                          "slug": f"{slug}-{arm}", "label": f"{t['id']} [{arm}]", "spec": spec,
                          "targs": f"-T agent=react -T arm={arm} {base}".strip(),
                          "arm": arm, "sandbox": True, "max_samples": 1,
                      })
          print(json.dumps(specs))
          PY
          echo "specs=$(cat specs.json)" >> "$GITHUB_OUTPUT"

  run:
    name: ${{ matrix.label }}
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.specs) }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Build sandbox images
        if: matrix.sandbox
        run: make eval-images
      - name: Run eval
        working-directory: evals
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'us-east-1' }}
        run: |
          uv run inspect eval "${{ matrix.spec }}" --log-dir logs/ --max-samples ${{ matrix.max_samples }} \
            --model "${{ vars.EVAL_MODEL || 'anthropic/bedrock/global.anthropic.claude-sonnet-4-6' }}" \
            ${{ matrix.targs }}
      - name: Gate (evals-pass-fail)
        if: matrix.arm != 'without_skill'
        working-directory: evals
        run: uv run evals-pass-fail
      - name: Stage per-job logs
        # This matrix entry's log, collected by `summarize` into one
        # consolidated `eval-logs-<sha>`. Short retention so these clear out.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-logs-${{ matrix.slug }}-${{ github.run_attempt }}
          path: evals/logs/
          retention-days: 1

  summarize:
    name: Collect logs + job summary
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Collect per-job logs
        uses: actions/download-artifact@v8
        with:
          path: evals/logs/
          pattern: eval-logs-*
          merge-multiple: true
      - name: Job summary (full)
        run: |
          mkdir -p evals/logs
          uv run evals-summarize --log-dir evals/logs/ --detail > evals/logs/summary.md \
            || printf '_Summary generation failed — see job logs._\n' > evals/logs/summary.md
          cat evals/logs/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload consolidated logs
        uses: actions/upload-artifact@v7
        with:
          name: eval-logs-${{ github.sha }}
          path: evals/logs/
          retention-days: 14

id: quality-check-deployment-status
name: Quality - Check deployment status
description: |
  Tests that the agent lists process definitions and finds the latest
  version.
tags:
  - quality

inputs:
  prompt: |
    Check if my latest deployment of the InvoiceApproval process
    succeeded and what version it is.

graders:
  - type: prompt
    name: rubric-judge
    config:
      prompt: |
        Score 1.0 if ALL of these hold for the agent's response,
        otherwise 0.0:
        - Uses `c8ctl list pd` or `c8ctl search pd` to find the process.
        - Shows the version number and deployment status.

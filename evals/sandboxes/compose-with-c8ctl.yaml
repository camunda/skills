# Sandbox compose — with-c8ctl archetype.
#
# Referenced directly from a scenario's task.py via
# ``Task(sandbox=("docker", str(SANDBOXES_DIR / "compose-with-c8ctl.yaml")))``.
# Used by scenarios that need c8ctl pre-installed but no separate
# verifier service (exit-code, transcript, judge, or a composite that
# doesn't include CPT).

services:
  default:
    image: camunda-skills-evals-with-c8ctl:latest
    working_dir: /workspace
    command: ["sleep", "infinity"]
    init: true
    volumes:
      - outputs:/workspace/outputs
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

volumes:
  outputs:

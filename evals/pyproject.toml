[project]
name = "camunda-skills-evals"
version = "0.1.0"
description = "Qualitative evaluation suite for camunda/skills. See ../docs/plans/01-eval-suite.md."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "inspect-ai>=0.3.158",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "ruff>=0.8",
]

[tool.uv]
# Co-located in-repo tool, not a published package — the harness is
# imported via PYTHONPATH (set in Makefile + CI workflows) so edits to
# task.py / lib/ are picked up live without a re-sync.
package = false

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]

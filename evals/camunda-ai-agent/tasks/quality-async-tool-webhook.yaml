id: quality-async-tool-webhook
name: Quality - Async tool with webhook
description: |
  Tests that the agent wraps a send service task + a webhook-correlated
  intermediate catch event in a sub-process tool.
tags:
  - quality

inputs:
  prompt: |
    I need a tool that sends a chat message to the customer and waits for
    their reply before the agent continues. Model it.

graders:
  - type: prompt
    name: rubric-judge
    config:
      prompt: |
        Score 1.0 if ALL of these hold for the agent's response,
        otherwise 0.0:
        - Wraps the send-then-wait pair in a bpmn:subProcess that acts as
          a single tool.
        - Service task generates a unique correlationKey per invocation
          (e.g. chatId + '-' + string(now())).
        - Intermediate catch event uses inbound.type io.camunda:webhook:1
          with correlationKeyExpression.
        - Defines a bpmn:message with zeebe:subscription correlationKey
          pointing at the local variable.
        - Maps the inbound payload into toolCallResult via
          resultExpression.

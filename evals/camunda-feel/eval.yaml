name: camunda-feel-eval
description: Evaluation suite for camunda-feel — trigger probes (positive/negative) and quality tasks for FEEL expressions.
skill: camunda-feel
version: "1.0"
baseline: true
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill complete the assigned task?
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
tasks:
  - "tasks/*.yaml"

name: Eval (PR)

# PR-tier eval suite. Scoped to scenarios whose metadata.skills
# intersects the changed skills under skills/<X>/. Manual override
# via the `evals:run` label.
#
# See docs/evals/ci-and-results.md for the tier matrix and PR-comment
# shape.

# Disabled while the harness is under review — the scenarios depend on
# LLM-backed runs we haven't validated end-to-end yet. Manual-only
# (workflow_dispatch) until the first scenario passes locally. Re-enable
# pull_request once that's solid.
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # for PR comment
  models: read           # auto-injected GITHUB_TOKEN can call GitHub Models

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-scenarios:
    name: Detect affected scenarios
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.filter.outputs.scenarios }}
      has-scenarios: ${{ steps.filter.outputs.has-scenarios }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          python-version-file: evals/.python-version
      - name: Sync deps
        working-directory: evals
        run: uv sync --frozen
      - name: Compute changed skills
        id: changed-skills
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # Skills appear as skills/<name>/...; extract unique <name> values.
          if [ -n "$base" ]; then
            git diff --name-only "$base..$head" \
              | awk -F/ '$1=="skills" && NF>1 {print $2}' \
              | sort -u > changed-skills.txt
          else
            ls skills > changed-skills.txt
          fi
          # When evals/ itself changed, run everything by emitting all skills.
          if git diff --name-only "$base..$head" 2>/dev/null | grep -q '^evals/'; then
            ls skills > changed-skills.txt
          fi
          echo "Changed skills:"
          cat changed-skills.txt
      - name: Filter scenarios via registry
        id: filter
        working-directory: evals
        run: |
          changed=$(tr '\n' ' ' < ../changed-skills.txt)
          scenarios_json=$(uv run evals-list --json --changed-skills $changed)
          echo "$scenarios_json"
          # GitHub Actions matrix wants a JSON list. Extract scenario ids.
          ids=$(echo "$scenarios_json" | python -c "import json,sys; print(json.dumps([s['id'] for s in json.load(sys.stdin)]))")
          echo "scenarios=$ids" >> "$GITHUB_OUTPUT"
          if [ "$ids" = "[]" ]; then
            echo "has-scenarios=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-scenarios=true" >> "$GITHUB_OUTPUT"
          fi

  run-scenarios:
    name: Eval ${{ matrix.scenario }}
    needs: detect-scenarios
    if: needs.detect-scenarios.outputs.has-scenarios == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJson(needs.detect-scenarios.outputs.scenarios) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version-file: evals/.python-version
      - name: Sync deps
        working-directory: evals
        run: uv sync --frozen
      - name: Build sandbox images
        run: make eval-images
      - name: Run scenario
        env:
          INSPECT_AGENT_BRIDGE: copilot-cli
          GITHUB_TOKEN: ${{ github.token }}
        run: make eval SCENARIO=${{ matrix.scenario }}
      - name: Upload eval logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-logs-${{ matrix.scenario }}-${{ github.run_attempt }}
          path: evals/logs/
          retention-days: 30

  summarize:
    name: Summarize → PR comment
    needs: run-scenarios
    if: always() && needs.detect-scenarios.outputs.has-scenarios == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version-file: evals/.python-version
      - name: Sync deps
        working-directory: evals
        run: uv sync --frozen
      - name: Download all logs
        uses: actions/download-artifact@v4
        with:
          path: evals/logs/
          pattern: eval-logs-*
          merge-multiple: true
      - name: Render summary
        id: summary
        working-directory: evals
        run: |
          {
            echo 'body<<COMMENT_EOF'
            uv run evals-summarize --log-dir logs/
            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Post / update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.summary.outputs.body }}
          edit-mode: replace
          comment-author: github-actions[bot]

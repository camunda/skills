id: quality-validate-and-fix
name: Quality - Validate and fix existing BPMN
description: |
  Tests that the agent validates an existing BPMN file with c8ctl bpmn
  lint, identifies issues, fixes them, and re-validates.
tags:
  - quality

inputs:
  prompt: |
    The file `invoice-approval.bpmn` exists in the working directory.
    Validate it with `c8ctl bpmn lint`, identify any errors or warnings,
    fix them, and write the corrected BPMN to outputs/process.bpmn (XML
    only, no fences, no commentary). The final file must pass `c8ctl
    bpmn lint --quiet` (no errors).
  files:
    - path: invoice-approval.bpmn

graders:
  - type: prompt
    name: rubric-judge
    config:
      prompt: |
        Score 1.0 if ALL of these hold, otherwise 0.0:
        - The agent ran c8ctl bpmn lint to validate the input file.
        - Reported validation results clearly in its response.
        - If errors existed, fixed them and re-validated.
        - The final file at outputs/process.bpmn passes c8ctl bpmn lint
          --quiet.

  - type: program
    name: bpmn-lint
    config:
      command: bash
      args:
        - evals/camunda-bpmn/graders/bpmn-lint.sh
        - outputs/process.bpmn

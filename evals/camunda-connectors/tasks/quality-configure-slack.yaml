id: quality-configure-slack
name: Quality - Configure Slack connector
description: |
  Tests that the agent applies the Slack outbound connector template via
  c8ctl element-template apply and configures channel/message with secret
  reference.
tags:
  - quality

inputs:
  prompt: |
    I have a service task Task_SendSlack in my process. Configure it to
    send a Slack message to the #alerts channel with the incident
    details.

graders:
  - type: prompt
    name: rubric-judge
    config:
      prompt: |
        Score 1.0 if ALL of these hold for the agent's response,
        otherwise 0.0:
        - Discovers the Slack template via `c8ctl element-template
          search 'slack'` (does not guess the template ID from memory).
        - Uses `c8ctl element-template apply` to apply the discovered
          Slack outbound connector template.
        - Configures channel and message input mappings.
        - Uses secrets reference for the Slack OAuth token (e.g.,
          {{secrets.SLACK_OAUTH_TOKEN}}).

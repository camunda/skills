id: quality-saas-profile-setup
name: Quality - SaaS profile setup
description: |
  Tests that the agent adds and activates a c8ctl profile for a SaaS
  cluster with the provided OAuth credentials.
tags:
  - quality

inputs:
  prompt: |
    Set up c8ctl to talk to my Camunda 8 SaaS cluster. Cluster URL is
    https://abc123.bru-2.zeebe.camunda.io and I have a client ID and
    secret from the Camunda console.

graders:
  - type: prompt
    name: rubric-judge
    config:
      prompt: |
        Score 1.0 if ALL of these hold for the agent's response,
        otherwise 0.0:
        - Uses `c8ctl add profile <name>` with --baseUrl, --clientId,
          --clientSecret flags.
        - Activates the profile with `c8ctl use profile <name>`.
        - Verifies the connection (e.g., `c8ctl get topology` or
          `c8ctl list pd`).
        - Does NOT append /v2 to the SaaS cluster URL manually
          (c8ctl handles this for cloud URLs).
        - Does NOT hardcode credentials in shell history visibly (uses
          placeholders or recommends env vars / secret managers if
          appropriate).

id: pos-parallel-gateway
name: Positive trigger - pos-parallel-gateway
description: Trigger probe ported from triggers.json (positive).
tags:
  - positive-trigger

inputs:
  prompt: 'Model a process where a check-inventory and a check-credit task run in parallel, and the flow only continues once both finish.'

expected:
  should_trigger: true

graders:
  - type: trigger
    name: trigger-positive
    config:
      skill_path: skills/camunda-bpmn/SKILL.md
      mode: positive
      threshold: 0.6

id: quality-first-element-access
name: Quality - FEEL 1-based list indexing
description: |
  Asks for a FEEL expression that returns the first element's
  `timestamp` from a list. FEEL uses 1-based indexing (`events[1]`),
  unlike most programming languages — 0-based attempts silently
  evaluate to null. Program graders catch the null-return case fully,
  so no prompt grader is needed here.
tags:
  - quality

inputs:
  prompt: |
    I need a FEEL expression that returns the timestamp of the first
    event in the `events` list. Each event has `timestamp` (number) and
    `type` (string) fields.

graders:
  - type: skill_invocation
    name: invoked-camunda-feel
    config:
      mode: any_order
      required_skills:
        - camunda-feel
      allow_extra: true

  - type: program
    name: feel-evaluate-3events
    config:
      command: bash
      args:
        - evals/camunda-feel/graders/feel-evaluate.sh
        - '{"events":[{"timestamp":100,"type":"created"},{"timestamp":200,"type":"paid"},{"timestamp":300,"type":"shipped"}]}'
        - "100"

  - type: program
    name: feel-evaluate-1event
    config:
      command: bash
      args:
        - evals/camunda-feel/graders/feel-evaluate.sh
        - '{"events":[{"timestamp":42,"type":"created"}]}'
        - "42"

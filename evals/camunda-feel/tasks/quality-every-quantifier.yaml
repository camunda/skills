id: quality-every-quantifier
name: Quality - FEEL every quantifier
description: |
  Tests use of FEEL's `every ... in ... satisfies ...` quantifier rather
  than count-based workarounds.
tags:
  - quality

inputs:
  prompt: |
    Write a FEEL expression that returns true when every line item in the
    `items` list has a positive price, and false otherwise. The input
    variable `items` is a list of contexts each with a `price` field.
    Write your final FEEL expression (and only the expression, no fences,
    no commentary) to outputs/answer.feel.

graders:
  - type: prompt
    name: idiomatic-check
    config:
      continue_session: true
      prompt: |
        Read outputs/answer.feel and score the *style* of the FEEL
        expression. The program graders alongside this one already
        verify the boolean output across edge cases — your job is to
        flag non-idiomatic code that happens to work.

        Score 1.0 if ALL hold, otherwise 0.0:
        - Uses the FEEL `every ... in ... satisfies ...` quantifier as
          the top-level construct.
        - Does NOT use a count-based workaround like
          `count(items[price <= 0]) = 0`.
        - Does NOT use a filter-then-compare workaround like
          `items[price <= 0] = []`.
        - The predicate is a single comparison, not a chained
          if-then-else.

  - type: program
    name: feel-evaluate-all-positive
    config:
      command: bash
      args:
        - evals/camunda-feel/graders/feel-evaluate.sh
        - outputs/answer.feel
        - '{"items":[{"price":10},{"price":20},{"price":30}]}'
        - "true"

  - type: program
    name: feel-evaluate-one-negative
    config:
      command: bash
      args:
        - evals/camunda-feel/graders/feel-evaluate.sh
        - outputs/answer.feel
        - '{"items":[{"price":10},{"price":-1},{"price":30}]}'
        - "false"

  - type: program
    name: feel-evaluate-zero-price
    config:
      command: bash
      args:
        - evals/camunda-feel/graders/feel-evaluate.sh
        - outputs/answer.feel
        - '{"items":[{"price":0}]}'
        - "false"

  - type: program
    name: feel-evaluate-empty
    config:
      command: bash
      args:
        - evals/camunda-feel/graders/feel-evaluate.sh
        - outputs/answer.feel
        - '{"items":[]}'
        - "true"

[project]
name = "camunda-skills-evals"
version = "0.1.0"
description = "Qualitative evaluation suite for camunda/skills. See ../docs/plans/01-eval-suite.md."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "inspect-ai>=0.3.158",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "ruff>=0.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eval_harness"]

id: pos-create-approval-flow
name: Positive trigger - pos-create-approval-flow
description: Trigger probe ported from triggers.json (positive).
tags:
  - positive-trigger

inputs:
  prompt: 'Create a BPMN 2.0 process for an invoice approval flow: a user task to review the invoice, then a gateway that branches on whether the amount exceeds 1000, with a manager-approval user task on the high branch.'

expected:
  should_trigger: true

graders:
  - type: trigger
    name: trigger-positive
    config:
      skill_path: skills/camunda-bpmn/SKILL.md
      mode: positive
      threshold: 0.6

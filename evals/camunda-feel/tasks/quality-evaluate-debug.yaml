id: quality-evaluate-debug
name: Quality - Debug broken FEEL context expression
description: |
  A four-entry context expression chained to `.total` should compute
  total price with tax for an `items` list, but returns null — two
  commas are missing. The agent has to spot and fix the issue without
  being told how. Grader extracts the corrected FEEL from the agent's
  response and evaluates it across two inputs.
tags:
  - quality

inputs:
  prompt: |
    This FEEL expression should compute total price with tax for an
    `items` list (each item has a `price` field), but it returns null:

    ```
    {
      subtotal: sum(items.price)
      taxRate: 0.19,
      tax: subtotal * taxRate
      total: subtotal + tax
    }.total
    ```

    Fix it.

graders:
  - type: skill_invocation
    name: invoked-camunda-feel
    config:
      mode: any_order
      required_skills:
        - camunda-feel
      allow_extra: true

  - type: program
    name: feel-evaluate-two-items
    config:
      command: bash
      args:
        - evals/camunda-feel/graders/feel-evaluate.sh
        - '{"items":[{"price":100},{"price":50}]}'
        - "178.5"

  - type: program
    name: feel-evaluate-one-item
    config:
      command: bash
      args:
        - evals/camunda-feel/graders/feel-evaluate.sh
        - '{"items":[{"price":1000}]}'
        - "1190"

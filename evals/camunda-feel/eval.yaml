name: camunda-feel-eval
description: Evaluation suite for camunda-feel — quality tasks for FEEL authoring/debugging plus trigger accuracy probes from trigger_tests.yaml.
skill: camunda-feel
version: "1.0"
baseline: true
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the skill complete the assigned task?
  - name: trigger_accuracy
    weight: 0.3
    threshold: 0.9
    description: Does the skill correctly trigger on relevant prompts and not on unrelated ones?
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
tasks:
  - "tasks/*.yaml"

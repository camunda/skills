target_skill: camunda-process-test
positive:
  - id: write-cpt
    prompt: "Write a Camunda Process Test that drives my approval process to completion and asserts the output variables."
  - id: full-coverage
    prompt: "I need CPT tests that reach full BPMN coverage for my order-fulfilment flow, including the error paths."
negative:
  - id: deploy-once
    prompt: "Just deploy my process to the cluster and run it once so I can watch it execute."
    should_load: [camunda-process-mgmt]

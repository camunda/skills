id: pos-multi-instance
name: Positive trigger - pos-multi-instance
description: Trigger probe ported from triggers.json (positive).
tags:
  - positive-trigger

inputs:
  prompt: 'The ''Review item'' task should run once per item in the order''s items list, in parallel. Configure the right BPMN multi-instance loop.'

expected:
  should_trigger: true

graders:
  - type: trigger
    name: trigger-positive
    config:
      skill_path: skills/camunda-bpmn/SKILL.md
      mode: positive
      threshold: 0.6

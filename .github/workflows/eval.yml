name: 🧪 Run skill evals

# Non-blocking PR eval signal — posts outcome + token-budget vs baseline as a
# PR comment. Does NOT gate merge (keep out of required status checks).
#
# Maintainer-gated by labels (only triage+ can label; fork PRs never get the
# secrets — this is `pull_request`, not `pull_request_target`):
#   - evals:run       → targets whose skills ∩ changed skills
#   - evals:run-all   → every target (suite integration check)
#   - evals:compare   → also run the without-skill arm of outcome evals
# workflow_dispatch (requires write access) can run a single target and toggle
# the comparison. Model: the EVAL_MODEL repo var (default an Anthropic Claude);
# the key is ANTHROPIC_API_KEY, read by Inspect on the runner — the sandbox
# bridge proxies model calls back to it, so the container carries no credential.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Substring of a target path to run, e.g. 'skills/camunda-bpmn' or 'scenarios/rocket-launch' (blank = all)"
        required: false
        default: ""
      compare:
        description: "Also run the without-skill arm"
        type: boolean
        default: false
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect affected targets
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'evals:run') ||
      contains(github.event.pull_request.labels.*.name, 'evals:run-all')
    runs-on: ubuntu-latest
    outputs:
      specs: ${{ steps.matrix.outputs.specs }}
      has: ${{ steps.matrix.outputs.has }}
      has_sandbox: ${{ steps.matrix.outputs.has_sandbox }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Compute changed skills
        env:
          RUN_ALL: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'evals:run-all') }}
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # run-all (or a dispatch with no PR) → every skill. A change to the
          # harness itself (evals/ tree or the Python project) also runs all.
          if [ "$RUN_ALL" = "true" ] || [ -z "$base" ]; then
            ls skills > changed-skills.txt
          else
            git diff --name-only "$base..$head" \
              | awk -F/ '$1=="skills" && NF>1 {print $2}' | sort -u > changed-skills.txt
            if git diff --name-only "$base..$head" \
                 | grep -qE '^evals/|^pyproject\.toml$|^uv\.lock$|^\.python-version$'; then
              ls skills > changed-skills.txt
            fi
          fi
          echo "Changed skills:"; cat changed-skills.txt

      - name: Build run matrix
        id: matrix
        env:
          COMPARE: ${{ contains(github.event.pull_request.labels.*.name, 'evals:compare') || github.event.inputs.compare == 'true' }}
          TARGET: ${{ github.event.inputs.target }}
        run: |
          changed=$(tr '\n' ' ' < changed-skills.txt)
          compare_flag=""; [ "$COMPARE" = "true" ] && compare_flag="--compare"
          # shellcheck disable=SC2086  # word-splitting is intended: one arg per skill
          uv run evals-build-matrix --changed-skills $changed --target "$TARGET" $compare_flag > specs.json
          specs=$(cat specs.json)
          echo "$specs"
          echo "specs=$specs" >> "$GITHUB_OUTPUT"
          [ "$specs" = "[]" ] && echo "has=false" >> "$GITHUB_OUTPUT" || echo "has=true" >> "$GITHUB_OUTPUT"
          # Only build the sandbox images when an outcome target is in scope
          # (triggers run sandbox-free), so a triggers-only run skips the build.
          if jq -e 'any(.[]; .sandbox == true)' specs.json >/dev/null; then
            echo "has_sandbox=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sandbox=false" >> "$GITHUB_OUTPUT"
          fi

  # Build the three sandbox images ONCE per run and ship them to the matrix as
  # an artifact, instead of every outcome job rebuilding them. The build uses a
  # GHA layer cache (type=gha), so base images are pulled from Docker Hub at most
  # once across runs — no more per-job rebuilds, no more registry-pull flakes.
  # Nothing is published to a registry.
  build-images:
    name: Build sandbox images
    needs: detect
    if: needs.detect.outputs.has_sandbox == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/build-sandbox-images

      - name: Save images
        working-directory: evals
        run: |
          docker save camunda-skills-evals-base:latest \
                      camunda-skills-evals-with-c8ctl:latest \
                      camunda-skills-evals-verifier:latest \
            | zstd -T0 > sandbox-images.tar.zst

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sandbox-images-${{ github.run_id }}
          path: evals/sandbox-images.tar.zst
          retention-days: 1
          overwrite: true

  run:
    name: ${{ matrix.label }}
    needs: [detect, build-images]
    # Runs when there are targets; tolerates build-images being skipped (a
    # triggers-only run has no sandbox targets and thus no images to build).
    if: >-
      needs.detect.outputs.has == 'true' &&
      (needs.build-images.result == 'success' || needs.build-images.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.specs) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Load sandbox images
        # Outcome jobs only — triggers run sandbox-free. The images were built
        # once by build-images; here we just restore them from the artifact.
        if: matrix.sandbox
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sandbox-images-${{ github.run_id }}
          path: /tmp/sandbox-images

      - name: docker load
        if: matrix.sandbox
        run: zstd -dc /tmp/sandbox-images/sandbox-images.tar.zst | docker load

      - name: Run eval
        # Single model via EVAL_MODEL. For a multi-model sweep, add a `model`
        # axis to the matrix include built in `detect`. ANTHROPIC_API_KEY is
        # read by Inspect on the runner; the sandbox bridge proxies model calls
        # back to it (the container carries no credential). Point EVAL_MODEL
        # elsewhere + swap the key if running another provider.
        working-directory: evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run inspect eval "${{ matrix.spec }}" --log-dir logs/ --display ${{ matrix.display }} ${{ matrix.limit }} \
            --model "${{ vars.EVAL_MODEL || 'anthropic/claude-sonnet-4-6' }}" \
            --temperature 0 \
            ${{ matrix.targs }}

      - name: Gate (evals-pass-fail)
        # Reds the check on a missed outcome threshold or a token-budget
        # regression. Skipped for the without-skill arm — it's a comparison,
        # not a quality bar. Non-blocking until added to required checks.
        if: matrix.arm != 'without_skill'
        working-directory: evals
        run: uv run evals-pass-fail

      - name: Stage per-job logs
        # This matrix entry's log, uploaded so `summarize` can collect them all
        # and republish one consolidated `eval-logs-<sha>`. Short retention so
        # these clear out and don't clutter the run's artifact list.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-logs-${{ matrix.slug }}-${{ github.run_attempt }}
          path: evals/logs/
          retention-days: 1

  summarize:
    name: Summarize → job summary + PR comment
    needs: [detect, run]
    if: always() && needs.detect.outputs.has == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Collect per-job logs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: evals/logs/
          pattern: eval-logs-*
          merge-multiple: true

      - name: Job summary (full)
        # Detailed view (incl. per-eval token usage) on the run page; also kept
        # in the consolidated artifact as summary.md.
        run: |
          mkdir -p evals/logs
          BLOB="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/blob/$GITHUB_SHA"
          uv run evals-summarize --log-dir evals/logs/ --detail --blob-base "$BLOB" > evals/logs/summary.md \
            || printf '_Summary generation failed — see job logs._\n' > evals/logs/summary.md
          cat evals/logs/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload consolidated logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-logs-${{ github.sha }}
          path: evals/logs/
          retention-days: 30

      - name: Render PR comment (lean)
        id: summary
        if: github.event_name == 'pull_request'
        run: |
          BLOB="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/blob/$GITHUB_SHA"
          RUN="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          {
            echo '<!-- camunda-skills-eval-comment -->'
            uv run evals-summarize --log-dir evals/logs/ --blob-base "$BLOB" --run-url "$RUN" \
              || printf '_Summary generation failed — see job logs._\n'
          } > eval-comment.md
          {
            echo 'body<<COMMENT_EOF'
            cat eval-comment.md
            printf '\n'
            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Find existing eval comment
        if: github.event_name == 'pull_request'
        id: find-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- camunda-skills-eval-comment -->

      - name: Post / update PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.summary.outputs.body }}
          edit-mode: replace

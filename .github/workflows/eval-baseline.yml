name: 🧪 Regenerate eval baselines

# Re-records each outcome eval's committed token baseline from a fresh run
# against the canonical EVAL_MODEL, then commits the result back to the branch
# (median per-id tokens, passing samples only — see evals-regenerate-baseline).
#
# Fans the outcome targets out across a matrix (one runner per target, like
# eval.yml) instead of regenerating them one after another; each job uploads
# just its outcomes_baseline.json and a final job collects them into one commit.
#
# Two maintainer-gated ways in:
#   - label a PR `evals:regenerate-baselines` → regenerate + commit to the PR branch;
#     the PR diff is the review surface. Works before these workflows land on
#     the default branch.
#   - workflow_dispatch (after merge) → regenerate on the chosen branch; refuses
#     to commit to the default branch — open a PR for that instead.
#
# Never runs on push/synchronize: auto-regenerate would rewrite the very yardstick
# the cost gate depends on. See evals/docs/ci.md.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Substring of an outcome target path to regenerate, e.g. 'scenarios/rocket-launch' (blank = all)"
        required: false
        default: ""
      epochs:
        description: "Epochs to median each baseline over"
        required: false
        default: "3"
  pull_request:
    types: [labeled]

permissions:
  contents: write

concurrency:
  group: eval-baseline-${{ github.ref }}
  cancel-in-progress: false

env:
  EPOCHS: ${{ github.event.inputs.epochs || '3' }}

jobs:
  detect:
    name: Detect outcome targets
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'evals:regenerate-baselines'
    runs-on: ubuntu-latest
    outputs:
      specs: ${{ steps.matrix.outputs.specs }}
      has: ${{ steps.matrix.outputs.has }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Build matrix (outcome targets only)
        id: matrix
        working-directory: evals
        env:
          WANT: ${{ github.event.inputs.target }}
        run: |
          # Reuse the run-matrix builder, then keep only the sandboxed (outcome)
          # entries — triggers have no baseline. The with_skill arm is the only
          # one regenerated (without_skill is a comparison, never a baseline).
          uv run evals-build-matrix --target "$WANT" > all-specs.json
          specs=$(jq -c '[.[] | select(.sandbox == true)]' all-specs.json)
          echo "$specs"
          if [ "$specs" = "[]" ]; then
            echo "no outcome targets matched target='$WANT'" >&2
            exit 1
          fi
          echo "specs=$specs" >> "$GITHUB_OUTPUT"
          echo "has=true" >> "$GITHUB_OUTPUT"

  # Build the three sandbox images ONCE and ship them to the matrix as an
  # artifact (same as eval.yml), instead of every regenerate job rebuilding
  # them. Registry-free: just the shared GHA layer cache.
  build-images:
    name: Build sandbox images
    needs: detect
    if: needs.detect.outputs.has == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/build-sandbox-images

      - name: Save images
        working-directory: evals
        run: |
          docker save camunda-skills-evals-base:latest \
                      camunda-skills-evals-with-c8ctl:latest \
                      camunda-skills-evals-verifier:latest \
            | zstd -T0 > sandbox-images.tar.zst

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sandbox-images-${{ github.run_id }}
          path: evals/sandbox-images.tar.zst
          retention-days: 1
          overwrite: true

  regenerate:
    name: ${{ matrix.label }}
    needs: [detect, build-images]
    if: needs.detect.outputs.has == 'true' && needs.build-images.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.specs) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Load sandbox images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sandbox-images-${{ github.run_id }}
          path: /tmp/sandbox-images

      - name: docker load
        run: zstd -dc /tmp/sandbox-images/sandbox-images.tar.zst | docker load

      - name: Run eval + regenerate baseline
        working-directory: evals
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'us-east-1' }}
          MODEL: ${{ vars.EVAL_MODEL || 'anthropic/bedrock/global.anthropic.claude-sonnet-4-6' }}
        run: |
          spec="${{ matrix.spec }}"
          dir="${spec%/outcomes.py}"   # skills/<name> or scenarios/<name>
          uv run inspect eval "$spec" --log-dir logs/ \
            --display ${{ matrix.display }} ${{ matrix.limit }} --epochs "$EPOCHS" \
            --model "$MODEL" --temperature 0 ${{ matrix.targs }} \
            || echo "::warning::run failed for $dir"
          # Regeneration refuses (non-zero) unless every sample passed. Stage the
          # file only on success — a refused target stages nothing, so the commit
          # job leaves its committed baseline untouched (never a partial wipe).
          if uv run evals-regenerate-baseline --target "$dir"; then
            mkdir -p "staged/$dir"
            cp "$dir/outcomes_baseline.json" "staged/$dir/outcomes_baseline.json"
          else
            echo "::warning::baseline not regenerated for $dir — left unchanged"
          fi

      - name: Upload regenerated baseline
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: baseline-${{ matrix.slug }}
          path: evals/staged/
          retention-days: 1
          if-no-files-found: ignore

  commit:
    name: Commit baselines to the branch
    needs: [detect, regenerate]
    if: always() && needs.detect.outputs.has == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target branch
        id: branch
        env:
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          branch="${HEAD_REF:-$REF_NAME}"
          if [ "$branch" = "$DEFAULT_BRANCH" ]; then
            echo "refusing to commit baselines to the default branch ($branch) — open a PR instead" >&2
            exit 1
          fi
          echo "name=$branch" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 0

      - name: Download regenerated baselines
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: regenerated
          pattern: baseline-*
          merge-multiple: true

      - name: Commit baselines to the branch
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          # Overlay the per-target files (regenerated/<skills|scenarios>/<name>/…)
          # onto the checkout; targets that didn't run keep their committed baseline.
          if [ -d regenerated ]; then cp -r regenerated/. evals/; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add evals/skills/*/outcomes_baseline.json evals/scenarios/*/outcomes_baseline.json
          if git diff --cached --quiet; then
            echo "no baseline changes to commit"; exit 0
          fi
          git commit -m "chore(evals): regenerate baselines on CI (epochs=${EPOCHS})"
          git push origin "HEAD:$BRANCH"

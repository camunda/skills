name: 🧪 Run skill evals (nightly)

# Broad regression sweep over every target (triggers + outcome evals),
# running both the with-skill and without-skill arms so the with/without delta
# is captured. Complements eval.yml's affected-subset PR signal. Uploads .eval
# logs; never blocks merges. See evals/docs/ci.md.
#
# Manual-only until the suite is stable; uncomment the schedule below to
# re-enable the nightly cron once it is.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 3 * * *"  # 03:00 UTC daily

permissions:
  contents: read

concurrency:
  group: eval-nightly
  cancel-in-progress: false

jobs:
  detect:
    name: Enumerate targets
    runs-on: ubuntu-latest
    outputs:
      specs: ${{ steps.matrix.outputs.specs }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - id: matrix
        # Every target; outcome evals run both arms (--compare).
        run: |
          uv run evals-build-matrix --compare > specs.json
          echo "specs=$(cat specs.json)" >> "$GITHUB_OUTPUT"

  # Build the three sandbox images once with a GHA layer cache and ship them to
  # the matrix as an artifact (see eval.yml for the rationale). Nightly always
  # runs outcome targets, so this is unconditional. Nothing is published.
  build-images:
    name: Build sandbox images
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/build-sandbox-images

      - name: Save images
        working-directory: evals
        run: |
          docker save camunda-skills-evals-base:latest \
                      camunda-skills-evals-with-c8ctl:latest \
                      camunda-skills-evals-verifier:latest \
            | zstd -T0 > sandbox-images.tar.zst

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sandbox-images-${{ github.run_id }}
          path: evals/sandbox-images.tar.zst
          retention-days: 1
          overwrite: true

  run:
    name: ${{ matrix.label }}
    needs: [detect, build-images]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.specs) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Load sandbox images
        if: matrix.sandbox
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sandbox-images-${{ github.run_id }}
          path: /tmp/sandbox-images

      - name: docker load
        if: matrix.sandbox
        run: zstd -dc /tmp/sandbox-images/sandbox-images.tar.zst | docker load

      - name: Run eval
        working-directory: evals
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'us-east-1' }}
        run: |
          uv run inspect eval "${{ matrix.spec }}" --log-dir logs/ --display plain ${{ matrix.limit }} \
            --model "${{ vars.EVAL_MODEL || 'anthropic/bedrock/global.anthropic.claude-sonnet-4-6' }}" \
            ${{ matrix.targs }}

      - name: Gate (evals-pass-fail)
        if: matrix.arm != 'without_skill'
        working-directory: evals
        run: uv run evals-pass-fail

      - name: Stage per-job logs
        # This matrix entry's log, collected by `summarize` into one
        # consolidated `eval-logs-<sha>`. Short retention so these clear out.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-logs-${{ matrix.slug }}-${{ github.run_attempt }}
          path: evals/logs/
          retention-days: 1

  summarize:
    name: Collect logs + job summary
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Collect per-job logs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: evals/logs/
          pattern: eval-logs-*
          merge-multiple: true

      - name: Job summary (full)
        run: |
          mkdir -p evals/logs
          BLOB="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/blob/$GITHUB_SHA"
          uv run evals-summarize --log-dir evals/logs/ --detail --blob-base "$BLOB" > evals/logs/summary.md \
            || printf '_Summary generation failed — see job logs._\n' > evals/logs/summary.md
          cat evals/logs/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload consolidated logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-logs-${{ github.sha }}
          path: evals/logs/
          retention-days: 14

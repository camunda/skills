id: pos-validate-bpmn
name: Positive trigger - pos-validate-bpmn
description: Trigger probe ported from triggers.json (positive).
tags:
  - positive-trigger

inputs:
  prompt: 'Check this BPMN file for problems and fix anything that won''t deploy to a Zeebe cluster.'

expected:
  should_trigger: true

graders:
  - type: trigger
    name: trigger-positive
    config:
      skill_path: skills/camunda-bpmn/SKILL.md
      mode: positive
      threshold: 0.6

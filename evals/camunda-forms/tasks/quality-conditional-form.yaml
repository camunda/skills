id: quality-conditional-form
name: Quality - Conditional approval form
description: |
  Tests that the agent uses a FEEL `conditional.hide` expression to
  show a comments field only when the decision is rejected.
tags:
  - quality

inputs:
  prompt: |
    Create a Camunda Form for an approval workflow: a decision
    component (approved/rejected) and a comments textarea that is only
    visible when the decision is `rejected`.

    Output ONLY the raw Camunda Form JSON object — no code fences, no
    commentary, no prose. Just the JSON.

graders:
  - type: json_schema
    name: form-schema
    config:
      schema_file: ../schemas/form.schema.json

  - type: prompt
    name: semantic-check
    config:
      prompt: |
        Score the agent's Camunda Form JSON. The json_schema grader
        already enforces structural validity — your job is to verify
        the conditional-visibility task.

        Score 1.0 if ALL hold, otherwise 0.0:
        - Has a radio or select component for the approval decision with
          at least two options including `approved` and `rejected`.
        - Has a textarea component for comments.
        - The comments component has a `conditional.hide` FEEL expression
          (starting with `=`) that evaluates truthy when the decision is
          NOT `rejected`.
        - The decision component is `required: true` (or equivalent in
          the `validate` block).

name: Eval (PR)

# Non-blocking PR eval signal. Runs the scenarios whose metadata.skills
# intersect the changed skills, then posts the outcome + baseline deltas
# as a PR comment. It does NOT gate merge (keep it out of required
# status checks).
#
# Maintainer-gated and opt-in: it runs only when a maintainer adds the
# `evals:run` label (or triggers it via the Actions tab). The `authorize`
# job verifies the triggering actor has write access. The model is served
# via AWS — see docs/evals/ci-and-results.md for the required secrets/vars.
on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  authorize:
    name: Authorize (maintainers only)
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('ok', 'true');  // dispatch already needs write access
              return;
            }
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const ok = ['admin', 'maintain', 'write'].includes(data.permission);
            core.info(`${context.actor} permission=${data.permission} → authorized=${ok}`);
            core.setOutput('ok', ok ? 'true' : 'false');

  detect-scenarios:
    name: Detect affected scenarios
    needs: authorize
    if: >-
      needs.authorize.outputs.ok == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       contains(github.event.pull_request.labels.*.name, 'evals:run'))
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.filter.outputs.scenarios }}
      has-scenarios: ${{ steps.filter.outputs.has-scenarios }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          python-version-file: .python-version
      - name: Sync deps
        run: uv sync --frozen
      - name: Compute changed skills
        id: changed-skills
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # Skills appear as skills/<name>/...; extract unique <name> values.
          if [ -n "$base" ]; then
            git diff --name-only "$base..$head" \
              | awk -F/ '$1=="skills" && NF>1 {print $2}' \
              | sort -u > changed-skills.txt
          else
            ls skills > changed-skills.txt
          fi
          # When the harness itself changed (evals/ tree or the root
          # Python project), run everything by emitting all skills.
          if git diff --name-only "$base..$head" 2>/dev/null \
               | grep -qE '^evals/|^pyproject\.toml$|^uv\.lock$|^\.python-version$'; then
            ls skills > changed-skills.txt
          fi
          echo "Changed skills:"
          cat changed-skills.txt
      - name: Filter scenarios via registry
        id: filter
        run: |
          changed=$(tr '\n' ' ' < changed-skills.txt)
          scenarios_json=$(uv run evals-list --json --changed-skills $changed)
          echo "$scenarios_json"
          # GitHub Actions matrix wants a JSON list. Extract scenario ids.
          ids=$(echo "$scenarios_json" | python -c "import json,sys; print(json.dumps([s['id'] for s in json.load(sys.stdin)]))")
          echo "scenarios=$ids" >> "$GITHUB_OUTPUT"
          if [ "$ids" = "[]" ]; then
            echo "has-scenarios=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-scenarios=true" >> "$GITHUB_OUTPUT"
          fi

  run-scenarios:
    name: Eval ${{ matrix.scenario }}
    needs: detect-scenarios
    if: needs.detect-scenarios.outputs.has-scenarios == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJson(needs.detect-scenarios.outputs.scenarios) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version-file: .python-version
      - name: Sync deps
        run: uv sync --frozen
      - name: Build sandbox images
        run: make eval-images
      - name: Run scenario (with-skill arm)
        # Non-blocking: a crashed run leaves no log → surfaced as a gap
        # in the PR comment, never a red required check.
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'us-east-1' }}
        run: make eval SCENARIO=${{ matrix.scenario }}
      - name: Upload eval logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-logs-${{ matrix.scenario }}-${{ github.run_attempt }}
          path: evals/logs/
          retention-days: 30

  summarize:
    name: Summarize → PR comment
    needs: run-scenarios
    if: always() && needs.detect-scenarios.outputs.has-scenarios == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version-file: .python-version
      - name: Sync deps
        run: uv sync --frozen
      - name: Download all logs
        uses: actions/download-artifact@v4
        with:
          path: evals/logs/
          pattern: eval-logs-*
          merge-multiple: true
      - name: Render summary
        id: summary
        run: |
          {
            echo 'body<<COMMENT_EOF'
            uv run evals-summarize --log-dir evals/logs/
            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Find existing eval comment
        if: github.event_name == 'pull_request'
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- camunda-skills-eval-comment -->
      - name: Post / update PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.summary.outputs.body }}
          edit-mode: replace

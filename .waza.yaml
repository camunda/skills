# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/config.schema.json

paths:
  skills: skills/
  evals: evals/
  results: results/

defaults:
  engine: copilot-sdk
  model: claude-sonnet-4.6
  # Use Haiku for prompt graders (LLM judge + trigger graders). Judging is a
  # simpler task than authoring, and haiku is much faster and cheaper.
  judgeModel: claude-haiku-4.5
  timeout: 300
  parallel: false
  workers: 4
  verbose: false
  sessionLog: false

cache:
  enabled: false
  dir: .waza-cache

server:
  port: 3000
  resultsDir: results/

dev:
  model: claude-sonnet-4.6
  target: medium-high
  maxIterations: 5

tokens:
  # aligned with the agentskills.io spec (5000 tokens per SKILL.md)
  warningThreshold: 4000
  fallbackLimit: 1500

  limits:
    defaults:
      "SKILL.md": 5000

graders:
  programTimeout: 30

storage:
  containerName: waza-results

target_skill: camunda-feel
positive:
  - id: gateway-condition
    prompt: "What FEEL expression do I put on a sequence flow so it's taken only when the variable `amount` is greater than 1000?"
  - id: date-arithmetic
    prompt: "How do I add 3 days to a date variable in a Camunda expression?"
  - id: list-filter
    prompt: "I have a list of order items in a variable. What's the FEEL to sum the `price` field across all of them?"
negative:
  - id: install-cli
    prompt: "I need a CLI to talk to my Camunda 8 cluster — how do I set it up?"
    should_load: [camunda-c8ctl]

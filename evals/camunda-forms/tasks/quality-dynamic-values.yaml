id: quality-dynamic-values
name: Quality - Dynamic dropdown values
description: |
  Tests that the agent uses `valuesExpression` bound to a process
  variable rather than a static `values` array.
tags:
  - quality

inputs:
  prompt: |
    Create a Camunda Form with a dropdown populated from a process
    variable called `departments`.

    Output ONLY the raw Camunda Form JSON object — no code fences, no
    commentary, no prose. Just the JSON.

graders:
  - type: json_schema
    name: form-schema
    config:
      schema_file: ../schemas/form.schema.json

  - type: prompt
    name: semantic-check
    config:
      prompt: |
        Score the agent's Camunda Form JSON. The json_schema grader
        already enforces structural validity — your job is to verify
        the dynamic-values task.

        Score 1.0 if ALL hold, otherwise 0.0:
        - Has a select component (`type: "select"` or `type: "radio"`
          would also be acceptable — any options-bearing component).
        - That component sets `valuesExpression` to `=departments` (a
          FEEL reference to the process variable).
        - That component does NOT also set a static `values` array
          (mixing the two is a bug).

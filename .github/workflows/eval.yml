name: Eval (PR)

# Non-blocking PR eval signal — posts outcome + token-budget vs baseline as a
# PR comment. Does NOT gate merge (keep out of required status checks).
#
# Maintainer-gated by labels (only triage+ can label; fork PRs never get the
# secrets — this is `pull_request`, not `pull_request_target`):
#   - evals:run       → targets whose skills ∩ changed skills
#   - evals:run-all   → every target (suite integration check)
#   - evals:compare   → also run the without-skill arm of outcome evals
# workflow_dispatch (requires write access) can run a single target and toggle
# the comparison. Model: the EVAL_MODEL repo var (default a Bedrock Claude).
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Substring of a target id to run (blank = all)"
        required: false
        default: ""
      compare:
        description: "Also run the without-skill arm"
        type: boolean
        default: false
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect affected targets
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'evals:run') ||
      contains(github.event.pull_request.labels.*.name, 'evals:run-all')
    runs-on: ubuntu-latest
    outputs:
      specs: ${{ steps.matrix.outputs.specs }}
      has: ${{ steps.matrix.outputs.has }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Compute changed skills
        env:
          RUN_ALL: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'evals:run-all') }}
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # run-all (or a dispatch with no PR) → every skill. A change to the
          # harness itself (evals/ tree or the Python project) also runs all.
          if [ "$RUN_ALL" = "true" ] || [ -z "$base" ]; then
            ls skills > changed-skills.txt
          else
            git diff --name-only "$base..$head" \
              | awk -F/ '$1=="skills" && NF>1 {print $2}' | sort -u > changed-skills.txt
            if git diff --name-only "$base..$head" \
                 | grep -qE '^evals/|^pyproject\.toml$|^uv\.lock$|^\.python-version$'; then
              ls skills > changed-skills.txt
            fi
          fi
          echo "Changed skills:"; cat changed-skills.txt
      - name: Build run matrix
        id: matrix
        env:
          COMPARE: ${{ contains(github.event.pull_request.labels.*.name, 'evals:compare') || github.event.inputs.compare == 'true' }}
          TARGET: ${{ github.event.inputs.target }}
        run: |
          changed=$(tr '\n' ' ' < changed-skills.txt)
          uv run evals-list --json --changed-skills $changed > targets.json
          # Expand each target into run specs: triggers are single-arm; outcome
          # evals run with_skill, plus without_skill when COMPARE.
          python3 - <<'PY' > specs.json
          import json, os
          targets = json.load(open("targets.json"))
          compare = os.environ.get("COMPARE") == "true"
          want = os.environ.get("TARGET") or ""
          specs = []
          for t in targets:
              if want and want not in t["id"]:
                  continue
              spec = t["path"] + (f"@{t['task']}" if t["task"] else "")
              base_targs = " ".join(f"-T {k}={v}" for k, v in (t["args"] or {}).items())
              slug = t["id"].replace(":", "-")
              if t["kind"] == "trigger":
                  # Structured single-shot routing: no agent, no sandbox; samples run in parallel.
                  specs.append({"slug": slug, "label": t["id"], "spec": spec, "targs": base_targs,
                                "arm": "", "sandbox": False, "max_samples": 5})
              else:
                  for arm in ["with_skill"] + (["without_skill"] if compare else []):
                      specs.append({
                          "slug": f"{slug}-{arm}", "label": f"{t['id']} [{arm}]", "spec": spec,
                          "targs": f"-T agent=react -T arm={arm} {base_targs}".strip(),
                          "arm": arm, "sandbox": True, "max_samples": 1,
                      })
          print(json.dumps(specs))
          PY
          specs=$(cat specs.json)
          echo "$specs"
          echo "specs=$specs" >> "$GITHUB_OUTPUT"
          [ "$specs" = "[]" ] && echo "has=false" >> "$GITHUB_OUTPUT" || echo "has=true" >> "$GITHUB_OUTPUT"

  run:
    name: ${{ matrix.label }}
    needs: detect
    if: needs.detect.outputs.has == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.specs) }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Build sandbox images
        if: matrix.sandbox
        run: make eval-images
      - name: Run eval
        # Single model via EVAL_MODEL. For a multi-model sweep, add a `model`
        # axis to the matrix include built in `detect`. AWS creds wire the
        # default Bedrock provider; swap if EVAL_MODEL points elsewhere.
        working-directory: evals
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'us-east-1' }}
        run: |
          uv run inspect eval "${{ matrix.spec }}" --log-dir logs/ --max-samples ${{ matrix.max_samples }} \
            --model "${{ vars.EVAL_MODEL || 'anthropic/bedrock/global.anthropic.claude-sonnet-4-6' }}" \
            ${{ matrix.targs }}
      - name: Gate (evals-pass-fail)
        # Reds the check on a missed outcome threshold or a token-budget
        # regression. Skipped for the without-skill arm — it's a comparison,
        # not a quality bar. Non-blocking until added to required checks.
        if: matrix.arm != 'without_skill'
        working-directory: evals
        run: uv run evals-pass-fail
      - name: Stage per-job logs
        # This matrix entry's log, uploaded so `summarize` can collect them all
        # and republish one consolidated `eval-logs-<sha>`. Short retention so
        # these clear out and don't clutter the run's artifact list.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-logs-${{ matrix.slug }}-${{ github.run_attempt }}
          path: evals/logs/
          retention-days: 1

  summarize:
    name: Summarize → job summary + PR comment
    needs: run
    if: always() && needs.detect.outputs.has == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Collect per-job logs
        uses: actions/download-artifact@v8
        with:
          path: evals/logs/
          pattern: eval-logs-*
          merge-multiple: true
      - name: Job summary (full)
        # Detailed view (incl. per-eval token usage) on the run page; also kept
        # in the consolidated artifact as summary.md.
        run: |
          mkdir -p evals/logs
          uv run evals-summarize --log-dir evals/logs/ --detail > evals/logs/summary.md \
            || printf '_Summary generation failed — see job logs._\n' > evals/logs/summary.md
          cat evals/logs/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload consolidated logs
        uses: actions/upload-artifact@v7
        with:
          name: eval-logs-${{ github.sha }}
          path: evals/logs/
          retention-days: 30
      - name: Render PR comment (lean)
        id: summary
        if: github.event_name == 'pull_request'
        run: |
          {
            echo '<!-- camunda-skills-eval-comment -->'
            uv run evals-summarize --log-dir evals/logs/ \
              || printf '_Summary generation failed — see job logs._\n'
          } > eval-comment.md
          {
            echo 'body<<COMMENT_EOF'
            cat eval-comment.md
            printf '\n'
            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Find existing eval comment
        if: github.event_name == 'pull_request'
        id: find-comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- camunda-skills-eval-comment -->
      - name: Post / update PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.summary.outputs.body }}
          edit-mode: replace

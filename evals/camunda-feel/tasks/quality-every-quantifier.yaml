id: quality-every-quantifier
name: Quality - Use FEEL `every ... satisfies` quantifier
description: |
  Asks for a FEEL expression that validates every item in a list against
  a predicate. Idiomatic FEEL is `every x in items satisfies x.price >
  0`. We grade functional correctness across edge cases (all-positive,
  one-negative, zero-price, empty list — which must return true under
  FEEL's vacuous-truth semantics) plus one prompt grader for idiom,
  because the entire point of this task is to surface non-idiomatic
  workarounds (count-based, filter-based) that happen to produce the
  right boolean.
tags:
  - quality

inputs:
  prompt: |
    I need a FEEL expression that returns true when every item in the
    `items` list has a positive price, and false otherwise. `items` is
    a list of contexts each with a `price` field.

graders:
  - type: skill_invocation
    name: invoked-camunda-feel
    config:
      mode: any_order
      required_skills:
        - camunda-feel
      allow_extra: true

  - type: prompt
    name: idiomatic-check
    config:
      prompt: |
        Look at the FEEL expression the agent provided (in a fenced code
        block in the response). Score 1.0 if it uses FEEL's `every ...
        in ... satisfies ...` quantifier as the top-level construct;
        0.0 otherwise. Reject count-based workarounds (`count(items[price
        <= 0]) = 0`), filter-then-compare workarounds (`items[price <=
        0] = []`), or chained if-then-else. The program graders
        alongside this one already verify the boolean output across edge
        cases.

  - type: program
    name: feel-evaluate-all-positive
    config:
      command: bash
      args:
        - evals/camunda-feel/graders/feel-evaluate.sh
        - '{"items":[{"price":10},{"price":20},{"price":30}]}'
        - "true"

  - type: program
    name: feel-evaluate-one-negative
    config:
      command: bash
      args:
        - evals/camunda-feel/graders/feel-evaluate.sh
        - '{"items":[{"price":10},{"price":-1},{"price":30}]}'
        - "false"

  - type: program
    name: feel-evaluate-zero-price
    config:
      command: bash
      args:
        - evals/camunda-feel/graders/feel-evaluate.sh
        - '{"items":[{"price":0}]}'
        - "false"

  - type: program
    name: feel-evaluate-empty
    config:
      command: bash
      args:
        - evals/camunda-feel/graders/feel-evaluate.sh
        - '{"items":[]}'
        - "true"

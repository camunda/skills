skill: camunda-bpmn

should_trigger_prompts:
  - prompt: "Create a BPMN 2.0 process for an invoice approval flow: a user task to review the invoice, then a gateway that branches on whether the amount exceeds 1000, with a manager-approval user task on the high branch."
    reason: New BPMN process authoring — direct ask
    confidence: high

  - prompt: "I have this BPMN file (examples/invoice-approval.bpmn). Add a parallel branch after the approval that also writes to an audit log via a service task."
    reason: Modifying an existing BPMN diagram with new elements
    confidence: high

  - prompt: "Check this BPMN file for problems and fix anything that won't deploy to a Zeebe cluster."
    reason: BPMN validation + fix — `c8ctl bpmn lint` is a core part of the skill
    confidence: high

  - prompt: "I need a service task wired up to a Zeebe job worker for the type 'send-email'. What does the BPMN XML look like with the right Zeebe attributes?"
    reason: Zeebe extension (taskDefinition) configuration on a BPMN element
    confidence: high

  - prompt: "Add a timer boundary event to my user task that escalates to a manager if the task isn't completed within 24 hours."
    reason: Adding a BPMN boundary event with a timer
    confidence: high

  - prompt: "I have a service task that calls an external HTTP API. Add an error boundary event so that on a 5xx response the process routes to a 'Notify ops' task."
    reason: Error boundary event + alternative-path modeling
    confidence: high

  - prompt: "Model a process where a check-inventory and a check-credit task run in parallel, and the flow only continues once both finish."
    reason: Parallel fork/join gateway pattern
    confidence: high

  - prompt: "The 'Review item' task should run once per item in the order's items list, in parallel. Configure the right BPMN multi-instance loop."
    reason: Multi-instance loop characteristics on a task
    confidence: high

  - prompt: "The process should wait for an external 'order-shipped' event before continuing. Add the right kind of event to model that."
    reason: Intermediate message catch event
    confidence: high

  - prompt: "I want my main order process to invoke a separate fulfillment process as a sub-flow. How do I model that handoff in BPMN?"
    reason: Call activity / sub-process composition
    confidence: high

should_not_trigger_prompts:
  - prompt: "How do I start a local Camunda 8 cluster on my laptop using c8run?"
    reason: Cluster setup — camunda-c8ctl territory, not BPMN authoring
    confidence: high

  - prompt: "Deploy this BPMN file to my Camunda 8 cluster."
    reason: Deployment of an existing file — camunda-process-mgmt, not authoring
    confidence: high

  - prompt: "Configure a Slack connector to post a message to the #ops channel on incident."
    reason: Connector configuration — camunda-connectors
    confidence: high

  - prompt: "Write a FEEL expression that returns true when the order total exceeds 1000."
    reason: Pure FEEL question — camunda-feel
    confidence: high

  - prompt: "Build a Camunda Form with fields for customer name, email, and a comments textarea."
    reason: Form schema authoring — camunda-forms
    confidence: high

  - prompt: "I have a stuck process instance with an incident on a service task. Help me find the root cause."
    reason: Runtime incident triage — camunda-process-mgmt — but BPMN-flavored vocabulary can mislead
    confidence: medium

  - prompt: "I'm on Camunda 7 (the old Java-engine). How do I configure an external task with a custom job type?"
    reason: Out of scope — these skills target Camunda 8 only
    confidence: high

  - prompt: "Implement an order state machine in TypeScript using xstate where orders go from pending → paid → shipped → delivered."
    reason: Generic state-machine code — "state machine" overlaps conceptually with BPMN flow
    confidence: medium

  - prompt: "Draw a UML activity diagram showing user authentication: enter credentials, validate, success or retry."
    reason: UML, not BPMN — different notation entirely
    confidence: high

  - prompt: "Use Graphviz to draw a flowchart of my CI pipeline showing build, test, lint, and deploy stages with their dependencies."
    reason: Generic graph drawing — not BPMN
    confidence: high

id: quality-list-running-instances
name: Quality - List running instances
description: |
  Tests that the agent lists active process instances using c8ctl.
tags:
  - quality

inputs:
  prompt: |
    Show me all running process instances.

graders:
  - type: prompt
    name: rubric-judge
    config:
      prompt: |
        Score 1.0 if ALL of these hold for the agent's response,
        otherwise 0.0:
        - Uses `c8ctl list pi` or `c8ctl search pi` command.
        - Presents results in a readable format.
